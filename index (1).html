<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMG Operations Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;line-height:1.5;display:flex;min-height:100vh}
/* SIDEBAR */
.sb{width:220px;background:#fff;border-right:1px solid #e5e5e3;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:1.25rem 1rem 1rem;border-bottom:1px solid #e5e5e3}
.sb-logo h1{font-size:15px;font-weight:700;color:#1a1a1a}
.sb-logo p{font-size:11px;color:#888;margin-top:2px}
.ns{padding:.6rem .75rem .2rem;font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em}
.ni{display:flex;align-items:center;gap:8px;padding:7px 1rem;cursor:pointer;font-size:13px;color:#555;border-left:3px solid transparent;transition:all .12s}
.ni:hover{background:#f5f5f3;color:#1a1a1a}
.ni.on{background:#E6F1FB;color:#0C447C;border-left-color:#185FA5;font-weight:600}
.nd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid #e5e5e3;padding:.875rem 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.topbar-title{font-size:17px;font-weight:700;flex:1;color:#1a1a1a}
.sync-row{display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#639922}
.sync-lbl{font-size:11px;color:#3B6D11}
.tbtn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid #d5d5d3;background:#fff;color:#333;cursor:pointer;font-weight:500}
.tbtn:hover{background:#f5f5f3}
.tbtn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.tbtn.primary:hover{background:#0C447C}
.content{padding:1.5rem;flex:1}
/* DASHBOARD TABS */
.dash-tabs{display:flex;border:1px solid #e5e5e3;border-radius:10px;overflow:hidden;margin-bottom:1.25rem;width:fit-content;background:#fff}
.dt{font-size:12px;padding:7px 18px;cursor:pointer;background:transparent;color:#666;border:none;border-right:1px solid #e5e5e3;font-weight:500}
.dt:last-child{border-right:none}
.dt.on{background:#E6F1FB;color:#0C447C;font-weight:700}
/* STATS */
.dash-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.mc{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:.875rem 1.1rem}
.ml{font-size:11px;color:#888;margin-bottom:4px}
.mv{font-size:26px;font-weight:700;color:#1a1a1a}
.mv.r{color:#A32D2D}.mv.a{color:#854F0B}.mv.g{color:#3B6D11}.mv.b{color:#185FA5}
/* SECTION HEADERS */
.sh{font-size:13px;font-weight:700;margin-bottom:8px;color:#1a1a1a}
.sh-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sh-cnt{font-size:11px;padding:2px 8px;border-radius:8px;background:#f0f0ee;color:#666}
/* URGENT LIST */
.ul{display:flex;flex-direction:column;gap:5px;margin-bottom:1.25rem}
.ui{background:#fff;border:1px solid #e5e5e3;border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ui:hover{background:#fafaf8}
.ua{font-size:13px;font-weight:600;flex:1;color:#1a1a1a}
/* BADGES */
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;white-space:nowrap}
.br{background:#FCEBEB;color:#A32D2D}
.ba{background:#FAEEDA;color:#854F0B}
.bg{background:#EAF3DE;color:#3B6D11}
.bb{background:#E6F1FB;color:#185FA5}
.bp{background:#EEEDFE;color:#3C3489}
.bgr{background:#F1EFE8;color:#5F5E5A}
.bau{background:#F1EFE8;color:#5F5E5A}
/* TODO */
.todo-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.add-task-btn{font-size:12px;padding:6px 16px;border-radius:8px;border:none;background:#185FA5;color:#fff;cursor:pointer;font-weight:600}
.add-task-btn:hover{background:#0C447C}
.add-form{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:1.1rem;margin-bottom:1rem;display:none}
.add-form.show{display:block}
.add-form h3{font-size:14px;font-weight:700;margin-bottom:10px;color:#1a1a1a}
.frow{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.fi{font-size:12px;padding:6px 10px;border:1px solid #d5d5d3;border-radius:8px;background:#fafaf8;color:#1a1a1a;flex:1;min-width:130px}
.fi:focus{outline:none;border-color:#378ADD}
.fact{display:flex;gap:8px}
.fb2{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid #d5d5d3;background:#fafaf8;color:#1a1a1a;cursor:pointer}
.fb2.p{background:#185FA5;color:#fff;border-color:#185FA5}
/* TASK CARDS */
.tlist{display:flex;flex-direction:column;gap:4px;margin-bottom:1.25rem}
.tc{background:#fff;border:1px solid #e5e5e3;border-radius:10px;overflow:hidden}
.tc.ov{border-color:#F09595}
.tc.dk{opacity:.6}
.tmain{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer}
.tmain:hover{background:#fafaf8}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid #d5d5d3;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:pointer;transition:all .12s}
.chk.on{background:#185FA5;border-color:#185FA5}
.chk.on::after{content:'';width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg);display:block;margin-top:-2px}
.tcont{flex:1;min-width:0}
.ttl{font-size:13px;font-weight:500;color:#1a1a1a;line-height:1.4}
.ttl.dk{text-decoration:line-through;color:#aaa}
.tmeta{display:flex;gap:5px;align-items:center;margin-top:3px;flex-wrap:wrap}
.tprop{font-size:10px;color:#888}
.tright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tdue{font-size:11px;color:#888;white-space:nowrap}
.tdue.ov{color:#A32D2D;font-weight:600}
.exbtn{font-size:10px;color:#aaa;padding:2px 6px;border-radius:4px;border:1px solid #e5e5e3;background:transparent;cursor:pointer;transition:transform .2s}
.tc.ex .exbtn{transform:rotate(180deg)}
/* TASK EXPAND */
.texp{display:none;border-top:1px solid #f0f0ee;padding:10px 14px 12px 40px;background:#fafaf8}
.tc.ex .texp{display:block}
.slist{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.sub{display:flex;align-items:center;gap:8px;padding:3px 0}
.schk{width:13px;height:13px;border-radius:3px;border:1.5px solid #d5d5d3;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.schk.on{background:#185FA5;border-color:#185FA5}
.schk.on::after{content:'';width:7px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg);display:block;margin-top:-1px}
.stl{font-size:12px;color:#1a1a1a;flex:1}
.stl.dk{text-decoration:line-through;color:#aaa}
.sdue{font-size:10px;color:#888;white-space:nowrap}
.sdue.ov{color:#A32D2D}
.subrow{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.mi{font-size:11px;padding:4px 8px;border:1px solid #d5d5d3;border-radius:6px;background:#fff;color:#1a1a1a;flex:1;min-width:100px}
.mi:focus{outline:none;border-color:#378ADD}
.mbtn{font-size:11px;padding:4px 10px;border-radius:6px;border:none;background:#185FA5;color:#fff;cursor:pointer;white-space:nowrap}
.arow{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
.albl{font-size:11px;color:#888;white-space:nowrap}
.asel{font-size:11px;padding:3px 7px;border:1px solid #d5d5d3;border-radius:6px;background:#fff;color:#1a1a1a}
.delbtn{font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid #F7C1C1;background:transparent;color:#A32D2D;cursor:pointer;margin-left:auto}
.nrow{display:flex;gap:7px;align-items:center;margin-top:7px}
.ninp{font-size:12px;padding:4px 9px;border:1px solid #d5d5d3;border-radius:6px;background:#fff;color:#1a1a1a;flex:1}
/* CALENDAR */
.cal-wrap{background:#fff;border:1px solid #e5e5e3;border-radius:12px;overflow:hidden}
.cal-hdr{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #e5e5e3}
.cal-mo{font-size:15px;font-weight:700;flex:1;text-align:center;color:#1a1a1a}
.cnav{font-size:12px;padding:5px 12px;border-radius:7px;border:1px solid #d5d5d3;background:transparent;cursor:pointer;color:#1a1a1a}
.dl-hdr{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #e5e5e3}
.dlbl{font-size:10px;font-weight:700;color:#888;text-align:center;padding:6px 0;text-transform:uppercase}
.dgrid{display:grid;grid-template-columns:repeat(7,1fr)}
.cell{min-height:80px;border-right:1px solid #e5e5e3;border-bottom:1px solid #e5e5e3;padding:5px;cursor:pointer;vertical-align:top;transition:background .1s}
.cell:hover{background:#f5f5f3}
.cell:nth-child(7n){border-right:none}
.cell.tod{background:#E6F1FB}
.cell.om .cdate{color:#ccc}
.cdate{font-size:11px;font-weight:600;color:#1a1a1a;margin-bottom:3px}
.cev{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;cursor:pointer}
.cev:hover{opacity:.8}
.cev.auto{background:#FAEEDA;color:#854F0B}
.cev.manual{background:#E6F1FB;color:#0C447C}
.cev.ov-ev{background:#FCEBEB;color:#A32D2D}
.cev.done-ev{background:#f0f0ee;color:#aaa;text-decoration:line-through}
.cal-add-hint{font-size:9px;color:#ccc;margin-top:2px}
/* QUICK-ADD MODAL */
.modal-bg{display:none;background:rgba(0,0,0,.35);position:fixed;inset:0;z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:420px;max-width:95vw}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1rem;color:#1a1a1a}
.modal .frow{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.modal .fi{font-size:13px;padding:7px 10px;border:1px solid #d5d5d3;border-radius:8px;background:#fafaf8;color:#1a1a1a;flex:1;min-width:140px}
.modal .fact{display:flex;gap:8px}
.modal .fb2{font-size:13px;padding:7px 16px;border-radius:8px;border:1px solid #d5d5d3;background:#fafaf8;color:#1a1a1a;cursor:pointer}
.modal .fb2.p{background:#185FA5;color:#fff;border-color:#185FA5}
/* MODULES */
.prop-grid{display:flex;flex-direction:column;gap:6px}
.prop-card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;overflow:hidden}
.prop-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer}
.prop-header:hover{background:#fafaf8}
.prop-addr{font-size:13px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a1a1a}
.prop-body{display:none;border-top:1px solid #f0f0ee;padding:14px}
.prop-card.open .prop-body{display:block}
.prop-card.open .chv{transform:rotate(180deg)}
.chv{font-size:9px;color:#aaa;transition:transform .2s}
.msg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.ms{border:1px solid #e5e5e3;border-radius:8px;padding:7px 9px;cursor:pointer}
.ms:hover{background:#f5f5f3}
.msn{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.msv{font-size:12px;font-weight:600;color:#185FA5}
.msv.none{color:#ccc;font-weight:400}
.mod-container{display:flex;flex-direction:column;gap:7px}
.mod-card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;overflow:hidden}
.mod-header{display:flex;align-items:center;gap:10px;padding:11px 15px;cursor:pointer}
.mod-header:hover{background:#fafaf8}
.mod-addr{font-size:13px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a1a1a}
.mod-body{display:none;border-top:1px solid #f0f0ee;padding:13px 15px}
.mod-card.open .mod-body{display:block}
.mod-card.open .mchv{transform:rotate(180deg)}
.mchv{font-size:9px;color:#aaa;transition:transform .2s}
.tabs{display:flex;border:1px solid #e5e5e3;border-radius:8px;overflow:hidden;margin-bottom:12px}
.tab{font-size:12px;padding:6px 14px;cursor:pointer;background:#fafaf8;color:#666;border:none;border-right:1px solid #e5e5e3;flex:1;text-align:center;font-weight:500}
.tab:last-child{border-right:none}
.tab.on{background:#fff;color:#1a1a1a;font-weight:700}
.tp{display:none}
.tp.show{display:block}
.ph-blk{margin-bottom:13px}
.ph-t{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid #f0f0ee}
.task-list2{display:flex;flex-direction:column;gap:4px}
.task2{display:flex;align-items:flex-start;gap:8px;padding:3px 0;cursor:pointer}
.task2 input[type=checkbox]{margin-top:2px;accent-color:#185FA5;cursor:pointer;width:14px;height:14px;flex-shrink:0}
.task2-text{font-size:12px;line-height:1.5;flex:1;color:#1a1a1a}
.task2.done .task2-text{text-decoration:line-through;color:#aaa}
.role{font-size:10px;color:#888;background:#f5f5f3;padding:1px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.pbar{height:5px;background:#f0f0ee;border-radius:3px;overflow:hidden;margin-bottom:3px}
.pfill{height:100%;background:#185FA5;border-radius:3px;transition:width .3s}
.pct-lbl{font-size:11px;color:#888;margin-bottom:10px}
.tpl-sec{margin-bottom:13px}
.tpl-sec-hdr{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.tpl-item{border:1px solid #e5e5e3;border-radius:8px;margin-bottom:5px;overflow:hidden}
.tpl-bar{display:flex;align-items:center;gap:10px;padding:8px 11px;cursor:pointer;background:#fafaf8}
.tpl-bar:hover{background:#f0f0ee}
.tpl-name{font-size:12px;font-weight:600;flex:1;color:#1a1a1a}
.tpl-tag{font-size:10px;padding:2px 7px;border-radius:6px;background:#E6F1FB;color:#0C447C;font-weight:600}
.tpl-body{display:none;padding:10px 11px;border-top:1px solid #e5e5e3}
.tpl-item.open .tpl-body{display:block}
.tpl-txt{font-size:11px;color:#1a1a1a;line-height:1.7;white-space:pre-wrap;background:#fafaf8;padding:9px;border-radius:7px;margin-bottom:7px;font-family:'Courier New',monospace;border:1px solid #e5e5e3}
.cbtn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #d5d5d3;background:#fff;color:#333;cursor:pointer}
.cbtn:hover{background:#fafaf8}
.notes-area{width:100%;font-size:12px;padding:8px 10px;border:1px solid #d5d5d3;border-radius:8px;background:#fafaf8;color:#1a1a1a;resize:vertical;min-height:70px;font-family:inherit;line-height:1.5}
.notes-area:focus{outline:none;border-color:#378ADD}
.field-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.field-lbl{font-size:12px;color:#666;white-space:nowrap;min-width:100px}
.field-input{font-size:12px;padding:5px 9px;border:1px solid #d5d5d3;border-radius:7px;background:#fafaf8;color:#1a1a1a;flex:1}
.field-input:focus{outline:none;border-color:#378ADD}
.sea-note{font-size:11px;color:#0C447C;background:#E6F1FB;padding:3px 9px;border-radius:5px;display:inline-block;font-weight:500;margin-bottom:8px}
.date-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.db{border:1px solid #e5e5e3;border-radius:7px;padding:7px 9px}
.dbl{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.dbv{font-size:11px;font-weight:600;color:#1a1a1a}
/* TRACKER */
.em-list{display:flex;flex-direction:column;gap:6px}
.em-card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;overflow:hidden}
.em-card.done-card{opacity:.6}
.em-main{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer}
.em-main:hover{background:#fafaf8}
.em-chk{width:16px;height:16px;border-radius:4px;border:1.5px solid #d5d5d3;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:pointer;transition:all .12s}
.em-chk.on{background:#185FA5;border-color:#185FA5}
.em-chk.on::after{content:'';width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg);display:block;margin-top:-2px}
.em-cont{flex:1;min-width:0}
.em-title{font-size:13px;font-weight:500;color:#1a1a1a;line-height:1.4}
.em-title.dk{text-decoration:line-through;color:#aaa}
.em-meta{display:flex;gap:5px;align-items:center;margin-top:3px;flex-wrap:wrap}
.em-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.em-date{font-size:11px;color:#888;white-space:nowrap}
.em-exbtn{font-size:10px;color:#aaa;padding:2px 6px;border-radius:4px;border:1px solid #e5e5e3;background:transparent;cursor:pointer;transition:transform .2s}
.em-card.ex .em-exbtn{transform:rotate(180deg)}
.em-exp{display:none;border-top:1px solid #f0f0ee;padding:10px 14px 12px 40px;background:#fafaf8}
.em-card.ex .em-exp{display:block}
.em-slist{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.em-sub{display:flex;align-items:center;gap:8px;padding:3px 0}
.em-schk{width:13px;height:13px;border-radius:3px;border:1.5px solid #d5d5d3;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.em-schk.on{background:#185FA5;border-color:#185FA5}
.em-schk.on::after{content:'';width:7px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg);display:block;margin-top:-1px}
.em-stl{font-size:12px;color:#1a1a1a;flex:1}
.em-stl.dk{text-decoration:line-through;color:#aaa}
.em-subrow{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.em-arow{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
.em-albl{font-size:11px;color:#888;white-space:nowrap}
.em-asel{font-size:11px;padding:3px 7px;border:1px solid #d5d5d3;border-radius:6px;background:#fff;color:#1a1a1a}
.em-delbtn{font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid #F7C1C1;background:transparent;color:#A32D2D;cursor:pointer;margin-left:auto}
.em-nrow{display:flex;gap:7px;align-items:center;margin-top:7px}
.em-ninp{font-size:12px;padding:4px 9px;border:1px solid #d5d5d3;border-radius:6px;background:#fff;color:#1a1a1a;flex:1}
.em-ninp:focus{outline:none;border-color:#378ADD}
.aef{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:13px;margin-bottom:11px;display:none}
.aef.show{display:block}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fgi{width:100%;font-size:12px;padding:6px 9px;border:1px solid #d5d5d3;border-radius:7px;background:#fafaf8;color:#1a1a1a}
/* CONTACTS */
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-bottom:1.5rem}
.contact-card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:1rem 1.1rem}
.contact-card:hover{border-color:#d5d5d3}
.contact-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.contact-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.contact-name{font-size:14px;font-weight:700;color:#1a1a1a}
.contact-prop{font-size:11px;color:#888;margin-top:1px}
.contact-fields{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px}
.cf-lbl{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px}
.cf-val{font-size:12px;color:#1a1a1a;font-weight:500}

/* TEMPLATES */
.tlib-section{margin-bottom:1.5rem}
.tlib-section-hdr{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:8px;padding:6px 10px;background:#fff;border:1px solid #e5e5e3;border-radius:8px;display:flex;align-items:center;gap:8px;cursor:pointer}
.tlib-section-hdr:hover{background:#fafaf8}
.tlib-items{display:flex;flex-direction:column;gap:6px}
.tlib-card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;overflow:hidden}
.tlib-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.tlib-header:hover{background:#fafaf8}
.tlib-title{font-size:13px;font-weight:600;flex:1;color:#1a1a1a}
.tlib-body{display:none;border-top:1px solid #f0f0ee;padding:14px}
.tlib-card.open .tlib-body{display:block}
.tlib-card.open .tlchv{transform:rotate(180deg)}
.tlchv{font-size:9px;color:#aaa;transition:transform .2s}
.tpl-editor{width:100%;font-size:12px;padding:10px;border:1px solid #d5d5d3;border-radius:8px;background:#fafaf8;color:#1a1a1a;resize:vertical;min-height:160px;font-family:'Courier New',monospace;line-height:1.6}
.tpl-editor:focus{outline:none;border-color:#378ADD}
.tpl-actions{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.tpl-saved{font-size:11px;color:#3B6D11;display:none}
.tpl-preview{background:#f0f8ff;border:1px solid #B5D4F4;border-radius:8px;padding:10px;font-size:12px;color:#1a1a1a;line-height:1.7;white-space:pre-wrap;font-family:'Courier New',monospace;margin-top:8px;display:none}
.tpl-preview.show{display:block}
.field-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.chip{font-size:10px;padding:2px 8px;border-radius:12px;background:#EEEDFE;color:#3C3489;cursor:pointer;font-weight:600;border:1px solid #AFA9EC}

.fb3{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid #d5d5d3;background:#fff;color:#666;cursor:pointer;font-weight:500}

function parseDate(s){if(!s||!s.trim())return null;const p=s.split('/');if(p.length<3)return null;const y=p[2].length===2?'20'+p[2]:p[2];return new Date(+y,+p[0]-1,+p[1]);}

const STORE = 'tmg_v3';
let S = {properties:[], tasks:{}, notes:{}, pf:{}, emails:[], todos:[], contacts:[], customTpls:{}};
function lS(){try{const d=localStorage.getItem(STORE);if(d){const p=JSON.parse(d);S={...S,...p};}}catch(e){}if(!S.properties||!S.properties.length)S.properties=JSON.parse(JSON.stringify(DEFAULT_PROPS));if(!S.todos)S.todos=[];if(!S.contacts)S.contacts=[];if(!S.customTpls)S.customTpls=[];}
function sS(){try{localStorage.setItem(STORE,JSON.stringify(S));setSS('saved');setTimeout(()=>setSS('ready'),1400);}catch(e){setSS('error');}}
function setSS(s){const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLbl');if(!dot||!lbl)return;const m={saving:['#EF9F27','Saving...'],saved:['#639922','Saved'],error:['#E24B4A','Error'],ready:['#639922','Ready']};const[c,t]=m[s]||['#888','—'];dot.style.background=c;lbl.textContent=t;}
function gT(mod,pid,tid){return!!(S.tasks[mod]&&S.tasks[mod][pid]&&S.tasks[mod][pid][tid]);}
function sT(mod,pid,tid,v){if(!S.tasks[mod])S.tasks[mod]={};if(!S.tasks[mod][pid])S.tasks[mod][pid]={};S.tasks[mod][pid][tid]=v;sS();}
function gN(mod,pid){return S.notes[mod+pid]||'';}
function sN(mod,pid,v){S.notes[mod+pid]=v;sS();}
function gPF(pid,k){return(S.pf[pid]||{})[k]||'';}
function sPF(pid,k,v){if(!S.pf[pid])S.pf[pid]={};S.pf[pid][k]=v;sS();}
function mPct(mod,pid){const defs=MTASKS[mod];if(!defs)return 0;const all=defs.flatMap(ph=>ph.tasks);return Math.round(all.filter(t=>gT(mod,pid,t.id)).length/all.length*100);}
function calcRD(p){const le=parseDate(p.leaseEnd),ls=parseDate(p.leaseStart);if(!le)return null;const sea=isSea(p.a);return{le,ls,sea,inspW:ls?{f:addD(ls,150),t:addD(ls,240)}:null,ownerBy:addD(le,-(sea?180:130)),riW:{f:addD(le,-115),t:addD(le,-100)},renSend:addD(le,-87),tenDl:addD(le,-30)};}
function rUrg(p){const st=calcRD(p);if(!st||!st.le)return'none';const de=Math.round((st.le-TODAY)/864e5);if(de<0)return'done';const d1=Math.round((st.ownerBy-TODAY)/864e5),d2=Math.round((st.riW.f-TODAY)/864e5),d3=Math.round((st.renSend-TODAY)/864e5);if(d1<=7||d2<=7||d3<=7)return'urgent';if(d1<=30||d2<=30||d3<=30)return'upcoming';return'ok';}

function genAutoTodos(){
  return S.properties.flatMap((p,i)=>{
    const st=calcRD(p);if(!st)return[];
    return[
      {id:'a-own-'+p.id,title:'Owner: rent increase decision due',prop:p.a.split(' ').slice(0,4).join(' '),due:d2iso(st.ownerBy),assign:'Ops Manager',module:'Lease Renewal',auto:true,done:false,subtasks:[],notes:''},
      {id:'a-ri-'+p.id,title:'Rent increase notice window opens',prop:p.a.split(' ').slice(0,4).join(' '),due:d2iso(st.riW.f),assign:'Ops Manager',module:'Lease Renewal',auto:true,done:false,subtasks:[],notes:''},
      {id:'a-ren-'+p.id,title:'Send renewal offer to tenant',prop:p.a.split(' ').slice(0,4).join(' '),due:d2iso(st.renSend),assign:'Ops Manager',module:'Lease Renewal',auto:true,done:false,subtasks:[],notes:''},
    ];
  });
}
function allTodos(){
  const auto=genAutoTodos();
  const aIds=new Set(auto.map(t=>t.id));
  const merged=auto.map(at=>{const st=(S.todos||[]).find(s=>s.id===at.id);return st?{...at,...st,auto:true}:at;});
  const manual=(S.todos||[]).filter(t=>!aIds.has(t.id));
  return[...merged,...manual].sort((a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return-1;return a.due.localeCompare(b.due);});
}
function saveTodo(t){const i=(S.todos||[]).findIndex(s=>s.id===t.id);if(i>=0)S.todos[i]=t;else{if(!S.todos)S.todos=[];S.todos.push(t);}sS();}
function deleteTodo(id){S.todos=(S.todos||[]).filter(t=>t.id!==id);sS();}

function setTV(v,btn){todoView=v;document.querySelectorAll('.dt').forEach(b=>b.classList.remove('on'));btn?.classList.add('on');const lv=document.getElementById('todoView');if(lv)lv.innerHTML=renderTodoView();const tl=document.querySelector('.todo-toolbar span');if(tl)tl.textContent={week:'This week',month:'This month',cal:'Calendar view',all:'All tasks'}[v]||v;}

function renderTodoView(){
  const all=allTodos();
  if(todoView==='cal') return rCal(all);
  let fil=all;
  if(todoView==='week') fil=all.filter(t=>(!t.done&&isOD(t.due))||isTW(t.due));
  else if(todoView==='month') fil=all.filter(t=>(!t.done&&isOD(t.due))||isTM(t.due));
  const ovd=fil.filter(t=>!t.done&&isOD(t.due));
  const up=fil.filter(t=>!t.done&&!isOD(t.due));
  const dn=fil.filter(t=>t.done);
  let h='';
  if(ovd.length>0) h+=`<div class="sh-row"><span class="sh" style="color:#A32D2D">Overdue</span><span class="sh-cnt" style="background:#FCEBEB;color:#A32D2D">${ovd.length}</span></div><div class="tlist">${ovd.map(rTodoCard).join('')}</div>`;
  if(up.length>0) h+=`<div class="sh-row"><span class="sh">Upcoming</span><span class="sh-cnt">${up.length}</span></div><div class="tlist">${up.map(rTodoCard).join('')}</div>`;
  if(dn.length>0) h+=`<div class="sh-row"><span class="sh" style="color:#888">Completed</span><span class="sh-cnt">${dn.length}</span></div><div class="tlist">${dn.map(rTodoCard).join('')}</div>`;
  if(!h) h='<div class="empty">No tasks for this period. Click "+ Add task" to get started.</div>';
  return h;
}

function rCal(tasks){
  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0);
  let cells=[];
  for(let i=0;i<first.getDay();i++) cells.push(null);
  for(let d=1;d<=last.getDate();d++) cells.push(new Date(calY,calM,d));
  while(cells.length%7) cells.push(null);
  const byDate={};
  tasks.forEach(t=>{if(t.due){if(!byDate[t.due])byDate[t.due]=[];byDate[t.due].push(t);}});
  return`<div class="cal-wrap">
    <div class="cal-hdr">
      <button class="cnav" onclick="calNav(-1)">◀</button>
      <span class="cal-mo">${MONTHS[calM]} ${calY}</span>
      <button class="cnav" onclick="calNav(1)">▶</button>
    </div>
    <div class="dl-hdr">${DAYS.map(d=>`<div class="dlbl">${d}</div>`).join('')}</div>
    <div class="dgrid">${cells.map(c=>{
      if(!c)return`<div class="cell om"><div class="cdate"></div></div>`;
      const ci=d2iso(c),isT=ci===d2iso(TODAY);
      const evts=byDate[ci]||[];
      return`<div class="cell ${isT?'tod':''}" onclick="openCalModal('${ci}')">
        <div class="cdate">${c.getDate()}</div>
        ${evts.slice(0,3).map(t=>`<div class="cev ${t.done?'done-ev':isOD(t.due)?'ov-ev':t.auto?'auto':'manual'}" title="${t.title}" onclick="event.stopPropagation();togTodoEx('${t.id}')">${t.title.length>18?t.title.slice(0,16)+'…':t.title}</div>`).join('')}
        ${evts.length>3?`<div style="font-size:9px;color:#aaa;padding:1px 3px">+${evts.length-3} more</div>`:''}
        <div class="cal-add-hint">+ add</div>
      </div>`;
    }).join('')}</div>
  </div>
  ${tasks.filter(t=>document.getElementById('todo-'+t.id)?.classList.contains('ex')).length>0?'':''} `;
}

function calNav(dir){calM+=dir;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}const lv=document.getElementById('todoView');if(lv)lv.innerHTML=renderTodoView();}

// MODAL for calendar click
function openCalModal(isoDate){
  const m=document.getElementById('modalBg');
  const dt=new Date(isoDate+'T00:00:00');
  document.getElementById('modalTitle').textContent='Add task — '+MONTHS[dt.getMonth()]+' '+dt.getDate();
  document.getElementById('m-due').value=isoDate;
  document.getElementById('m-title').value='';
  document.getElementById('m-prop').value='';
  document.getElementById('m-assign').value='';
  document.getElementById('m-mod').value='General';
  m.classList.add('show');
}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
function saveModal(){
  const title=document.getElementById('m-title')?.value?.trim();
  if(!title)return;
  if(!S.todos)S.todos=[];
  S.todos.push({id:'m-'+Date.now(),title,prop:document.getElementById('m-prop')?.value||'',due:document.getElementById('m-due')?.value||null,assign:document.getElementById('m-assign')?.value||'',module:document.getElementById('m-mod')?.value||'General',auto:false,done:false,subtasks:[],notes:''});
  sS();closeModal();
  const lv=document.getElementById('todoView');if(lv)lv.innerHTML=renderTodoView();
}
document.getElementById('modalBg').addEventListener('click',function(e){if(e.target===this)closeModal();});

// TODO ACTIONS
function togTodoEx(id){
  const el=document.getElementById('todo-'+id);if(!el)return;
  el.classList.toggle('ex');
  const b=el.querySelector('.exbtn');if(b)b.textContent=el.classList.contains('ex')?'▲':'▼';
}
function togTodo(id,e){
  e.stopPropagation();
  const all=allTodos();const t=all.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;saveTodo(t);
  const lv=document.getElementById('todoView');if(lv)lv.innerHTML=renderTodoView();
}
function togSub(tid,si){
  const all=allTodos();const t=all.find(x=>x.id===tid);if(!t||!t.subtasks)return;
  t.subtasks[si].done=!t.subtasks[si].done;saveTodo(t);
  const lv=document.getElementById('todoView');if(lv)lv.innerHTML=renderTodoView();
}
function addSubtask(tid){
  const inp=document.getElementById('sub-inp-'+tid);if(!inp||!inp.value.trim())return;
  const all=allTodos();const t=all.find(x=>x.id===tid);if(!t)return;
  if(!t.subtasks)t.subtasks=[];
  t.subtasks.push({title:inp.value.trim(),done:false,due:document.getElementById('sub-due-'+tid)?.value||null,assign:document.getElementById('sub-asgn-'+tid)?.value||''});
  inp.value='';
  const sd=document.getElementById('sub-due-'+tid);if(sd)sd.value='';
  const sa=document.getElementById('sub-asgn-'+tid);if(sa)sa.value='';
  saveTodo(t);
  const lv=document.getElementById('todoView');if(lv)lv.innerHTML=renderTodoView();
  setTimeout(()=>{const el=document.getElementById('todo-'+tid);if(el&&!el.classList.contains('ex'))togTodoEx(tid);},30);
}
function updTodoA(id,v){const all=allTodos();const t=all.find(x=>x.id===id);if(!t)return;t.assign=v;saveTodo(t);}
function updTodoD(id,v){const all=allTodos();const t=all.find(x=>x.id===id);if(!t)return;t.due=v||null;saveTodo(t);const lv=document.getElementById('todoView');if(lv)lv.innerHTML=renderTodoView();}
function updTodoN(id,v){const all=allTodos();const t=all.find(x=>x.id===id);if(!t)return;t.notes=v;saveTodo(t);}
function delTodoItem(id){deleteTodo(id);const lv=document.getElementById('todoView');if(lv)lv.innerHTML=renderTodoView();}
function addTodo(){
  const title=document.getElementById('ft-title')?.value?.trim();if(!title)return;
  if(!S.todos)S.todos=[];
  S.todos.push({id:'m-'+Date.now(),title,prop:document.getElementById('ft-prop')?.value||'',due:document.getElementById('ft-due')?.value||null,assign:document.getElementById('ft-assign')?.value||'',module:document.getElementById('ft-mod')?.value||'General',auto:false,done:false,subtasks:[],notes:''});
  sS();
  ['ft-title','ft-prop','ft-due'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('addTodoForm')?.classList.remove('show');
  const lv=document.getElementById('todoView');if(lv)lv.innerHTML=renderTodoView();
}

  return`<div class="ctrls-bar">

  return`<div class="mod-card" id="mc-${mod}-${pid}" data-pct="${pct}">

      <span class="badge ${pct===100?'bg':pct>0?'ba':'bgr'}">${pct===100?'Complete':pct>0?pct+'% done':'Not started'}</span>
      <span class="mchv">▼</span>
    </div>
    <div class="mod-body" id="mb-${mod}-${pid}">

      ${datesH}

      <div class="pct-lbl" id="pl-${mod}-${pid}">${pct}% complete</div>
      <div class="tabs" id="tabs-${mod}-${pid}">
        <button class="tab on" onclick="swTab('${mod}','${pid}','tasks',this)">Tasks</button>
        <button class="tab" onclick="swTab('${mod}','${pid}','templates',this)">Templates</button>
        <button class="tab" onclick="swTab('${mod}','${pid}','notes',this)">Notes</button>
      </div>
      <div class="tp show" id="tp-tasks-${mod}-${pid}">${tasksH}</div>
      <div class="tp" id="tp-templates-${mod}-${pid}">${tplsH}</div>

        <textarea class="notes-area" placeholder="Notes..." oninput="clearTimeout(ntTimers['${mod}${pid}']);ntTimers['${mod}${pid}']=setTimeout(()=>sN('${mod}','${pid}',this.value),600)">${gN(mod,pid)}</textarea>

}
function swTab(mod,pid,tab,btn){['tasks','templates','notes'].forEach(t=>{const el=document.getElementById('tp-'+t+'-'+mod+'-'+pid);if(el)el.classList.toggle('show',t===tab);});document.querySelectorAll('#tabs-'+mod+'-'+pid+' .tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function togModTask(mod,pid,tid,el){sT(mod,pid,tid,el.checked);el.closest('.task2').classList.toggle('done',el.checked);const p=mPct(mod,pid);const pf=document.getElementById('pf-'+mod+'-'+pid);const pl=document.getElementById('pl-'+mod+'-'+pid);if(pf)pf.style.width=p+'%';if(pl)pl.textContent=p+'% complete';}
function fMod(f,btn){document.querySelectorAll('.fb3').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.querySelectorAll('.mod-card').forEach(c=>{const p=parseInt(c.dataset.pct||0);c.style.display=f==='all'?'':f==='in'?(p>0&&p<100?'':'none'):f==='done'?(p===100?'':'none'):'';});}
function cpT(btn){const txt=btn.closest('.tpl-body')?.querySelector('.tpl-txt');if(txt&&navigator.clipboard)navigator.clipboard.writeText(txt.textContent).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);});}

function showContactTab(type){

  return`<div class="contact-card">
    <div class="contact-header">
      <div class="contact-avatar" style="background:${bg}20;color:${bg}">${initials}</div>
      <div>
        <div class="contact-name">${c.name||'—'}</div>
        <div class="contact-prop">${c.property||'No property linked'}</div>
      </div>
      <span class="badge ${c.type==='tenant'?'bg':'bp'}" style="margin-left:auto">${c.type==='tenant'?'Tenant':'Owner'}</span>

function saveContact(idx){
  const c={
    name:document.getElementById('cf-name')?.value||'',
    type:document.getElementById('cf-type')?.value||'tenant',
    phone:document.getElementById('cf-phone')?.value||'',
    email:document.getElementById('cf-email')?.value||'',
    property:document.getElementById('cf-prop')?.value||'',
    mailingAddress:document.getElementById('cf-addr')?.value||'',
    moveIn:document.getElementById('cf-movein')?.value||'',
    leaseEnd:document.getElementById('cf-leaseend')?.value||'',
  };
  if(!c.name)return alert('Please enter a name.');
  if(!S.contacts)S.contacts=[];
  if(idx!==null&&idx!==undefined)S.contacts[idx]=c;
  else S.contacts.push(c);
  sS();render('contacts');
}

function editContact(i){
  const c=S.contacts[i];
  openContactForm(c.type,c,i);
  document.getElementById('contact-form-wrap').scrollIntoView({behavior:'smooth'});
}

function useContactTemplates(i){
  const c=S.contacts[i];
  if(!c)return;
  localStorage.setItem('tmg_active_contact',JSON.stringify(c));
  go('templates');
  setTimeout(()=>{
    const el=document.getElementById('active-contact-banner');

function getTpls(){
  if(!S.customTpls) S.customTpls={};
  return DEFAULT_TPLS_FLAT.map(t=>({...t,body:S.customTpls[t.id]!==undefined?S.customTpls[t.id]:t.body}));
}

function fillTemplate(body, contact){
  if(!contact) return body;
  const prop = contact.property||'';
  const linkedTenant = (S.contacts||[]).find(c=>c.type==='tenant'&&c.property===prop);
  const linkedOwner = (S.contacts||[]).find(c=>c.type==='owner'&&c.property===prop);
  return body
    .replace(/\{tenant_name\}/g, linkedTenant?.name||contact.name||'{tenant_name}')
    .replace(/\{owner_name\}/g, linkedOwner?.name||'{owner_name}')
    .replace(/\{property_address\}/g, prop||'{property_address}')
    .replace(/\{tenant_email\}/g, linkedTenant?.email||contact.email||'{tenant_email}')
    .replace(/\{tenant_phone\}/g, linkedTenant?.phone||contact.phone||'{tenant_phone}')
    .replace(/\{owner_email\}/g, linkedOwner?.email||'{owner_email}')
    .replace(/\{owner_phone\}/g, linkedOwner?.phone||'{owner_phone}')
    .replace(/\{move_in\}/g, linkedTenant?.moveIn||contact.moveIn||'{move_in}')
    .replace(/\{lease_end\}/g, linkedTenant?.leaseEnd||contact.leaseEnd||'{lease_end}')
    .replace(/\{pm_name\}/g, gPF(S.properties.find(p=>p.a===prop)?.id||'','pm')||'{pm_name}');
}

        <span style="flex:1">${mod} templates</span>
        <span style="font-size:10px;color:#aaa">${tpls.filter(t=>t.module===mod).length} templates</span>
        <span style="font-size:9px;color:#aaa;margin-left:6px">▼</span>
      </div>
      <div class="tlib-items" id="ts-${mod.replace(/\s/g,'-')}">
        ${tpls.filter(t=>t.module===mod).map(t=>`
          <div class="tlib-card" id="tlc-${t.id}">
            <div class="tlib-header" onclick="togTlib('${t.id}')">
              <span class="tlib-title">${t.name}</span>
              <span class="badge ${mc[t.module]||'bgr'}">${t.tag}</span>
              ${S.customTpls&&S.customTpls[t.id]!==undefined?'<span class="badge" style="background:#FAEEDA;color:#854F0B">Edited</span>':''}
              <span class="tlchv">▼</span>
            </div>
            <div class="tlib-body">
              <textarea class="tpl-editor" id="te-${t.id}" oninput="autoSaveTpl('${t.id}',this.value)">${t.body}</textarea>
              <div class="tpl-actions">
                <button class="tbtn primary" onclick="copyTplFilled('${t.id}',this)">Copy template</button>
                <button class="tbtn" onclick="previewTpl('${t.id}')">Preview with contact data</button>
                <button class="tbtn" onclick="resetTpl('${t.id}')">Reset to default</button>
                <span class="tpl-saved" id="ts-saved-${t.id}">Saved</span>
              </div>
              <div class="tpl-preview" id="tp-prev-${t.id}"></div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('')}`;
}

function togTlib(id){document.getElementById('tlc-'+id)?.classList.toggle('open');}
function togSection(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'':'none';}

let tplSaveTimers={};
function autoSaveTpl(id,val){
  clearTimeout(tplSaveTimers[id]);
  tplSaveTimers[id]=setTimeout(()=>{
    if(!S.customTpls)S.customTpls={};
    const def=DEFAULT_TPLS_FLAT.find(t=>t.id===id);
    if(def&&val===def.body){delete S.customTpls[id];}
    else{S.customTpls[id]=val;}
    sS();
    const sv=document.getElementById('ts-saved-'+id);
    if(sv){sv.style.display='inline';setTimeout(()=>sv.style.display='none',1500);}
  },600);
}

function resetTpl(id){
  if(!confirm('Reset this template to the original default?'))return;
  if(!S.customTpls)S.customTpls={};
  delete S.customTpls[id];
  sS();
  const ta=document.getElementById('te-'+id);
  const def=DEFAULT_TPLS_FLAT.find(t=>t.id===id);
  if(ta&&def)ta.value=def.body;
  const sv=document.getElementById('ts-saved-'+id);
  if(sv){sv.style.display='inline';sv.textContent='Reset to default';setTimeout(()=>{sv.style.display='none';sv.textContent='Saved';},1500);}
}

function copyTplFilled(id,btn){
  let activeContact=null;
  try{const ac=localStorage.getItem('tmg_active_contact');if(ac)activeContact=JSON.parse(ac);}catch(e){}
  const ta=document.getElementById('te-'+id);
  if(!ta)return;
  const filled=fillTemplate(ta.value,activeContact);
  if(navigator.clipboard){
    navigator.clipboard.writeText(filled).then(()=>{
      const orig=btn.textContent;btn.textContent='Copied!';
      setTimeout(()=>btn.textContent=orig,1500);
    });
  }
}

function previewTpl(id){
  let activeContact=null;
  try{const ac=localStorage.getItem('tmg_active_contact');if(ac)activeContact=JSON.parse(ac);}catch(e){}
  const ta=document.getElementById('te-'+id);
  const prev=document.getElementById('tp-prev-'+id);
  if(!ta||!prev)return;
  const filled=fillTemplate(ta.value,activeContact);
  prev.textContent=filled;
  prev.classList.toggle('show');
}

function insertField(key){
  if(navigator.clipboard){
    navigator.clipboard.writeText(key).then(()=>{
      const chips=document.querySelectorAll('.chip');
      chips.forEach(c=>{if(c.getAttribute('onclick')&&c.getAttribute('onclick').includes(key)){const orig=c.textContent;c.textContent='Copied!';setTimeout(()=>c.textContent=orig,1000);}});
    });
  }
}

// ── INIT ────────────────────────────────────────────────────────────────────
lS();
go('dashboard');
</script>
</body>
